[mypy]
python_version = 3.10
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
no_implicit_optional = True
strict_optional = True
ignore_missing_imports = True

# Telegram handler adapters: pytb's stubs treat update.message and
# update.effective_user as Optional, but MessageHandler/CommandHandler
# only fire when those exist. Relax strict-def + union-attr noise here
# rather than salt every handler with redundant asserts.
[mypy-hourly_logger.handlers.*]
disallow_untyped_defs = False
disallow_incomplete_defs = False
disable_error_code = union-attr,arg-type,no-any-return

# Scheduler also takes a telegram.Bot at the boundary.
[mypy-hourly_logger.scheduler]
disallow_untyped_defs = False
disallow_incomplete_defs = False

# gspread 6.x ships stubs that require ValueInputOption / ValueRenderOption
# enums, but the documented public API still accepts the literal strings.
# Keep the runtime-valid strings and silence the wrapper-stub mismatch.
[mypy-hourly_logger.sheets]
disable_error_code = arg-type

# Third-party libs without type stubs.
[mypy-gspread.*]
ignore_missing_imports = True

[mypy-google.auth.*]
ignore_missing_imports = True

[mypy-google.oauth2.*]
ignore_missing_imports = True

[mypy-apscheduler.*]
ignore_missing_imports = True

[mypy-telegram.*]
ignore_missing_imports = True
